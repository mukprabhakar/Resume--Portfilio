<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mukesh Pal - Full-Stack Developer Portfolio</title>
  <script>
    // GitHub Pages SPA redirect handler
    // This preserves the path when redirecting to index.html
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;
    
    // Redirect to index.html with the original path as a parameter
    window.location.href = `/?redirect=${encodeURIComponent(path + search + hash)}`;
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
