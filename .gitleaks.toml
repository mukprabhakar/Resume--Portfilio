# Gitleaks Configuration
# This file configures secret scanning for the repository

[allowlist]
  description = "Allowlist for false positive detections"
  
  # Allow example files with placeholder values
  paths = [
    '''\.env\.example''',
    '''\.md$''',
    '''docs/.*''',
  ]
  
  # Allow placeholder patterns (not real secrets)
 regexes = [
    '''G-XXXXXXXXXX''',
    '''G-ABC\d+DEF\d+''',
    '''your-form-id''',
    '''mldprgag''',  # Formspree form ID (public, not a secret)
    '''AZURE_STATIC_WEB_APPS_API_TOKEN_\w+''',
    '''LHCI_GITHUB_APP_TOKEN''',
    '''VITE_GA_MEASUREMENT_ID''',
  ]

# Disable rules that generate false positives
[[rules]]
  id = "generic-secret"
 regex = '''(?i)(api[_-]?key|secret[_-]?key|password|token)\s*=\s*['\"][^'\"]{0,20}['\"]'''
  tags = ["key", "AWS", "SecretKey"]
  
[[rules.allowlists]]
 regexes = [
    '''process\.env\.''',
    '''import\.meta\.env\.''',
    '''secrets\.''',
  ]
