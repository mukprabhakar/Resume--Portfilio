name: Mukesh Pal Portfolio
buildAndJobType: staticwebapp
triggeringBranches:
  - main
  - master

build:
  appLocation: "/"
  outputLocation: "dist"
  appBuildCommand: "npm run build"
  apiLocation: ""
  outputApiLocation: ""

# Handle SPA routing - redirect all routes to index.html
routes:
  - route: "/*"
    serve: "/index.html"
    statusCode: 200

# Custom 404 handling
navigationFallback:
  rewrite: /index.html
  exclude: ["/images/*.{png,jpg,gif}", "/css/*"]
