# CodeQL Configuration for React Portfolio
# This file configures CodeQL analysis to reduce false positives

name: "CodeQL Config"

paths-ignore:
  - node_modules
  - dist
  - build
  - coverage
  - "**/*.test.js"
  - "**/*.test.jsx"
  - "**/*.spec.js"
  - "**/*.md"
  - .github/workflows
  - public

queries:
  - uses: security-extended
  - uses: security-and-quality

query-filters:
  # Exclude queries that generate false positives in React code
  - exclude:
      id: js/xss
     tags contain: client-xss
    
  - exclude:
      id: js/xss
     tags contain: reflected-xss
      
  # These are handled by DOMPurify and React's built-in protection
  - exclude:
      id: js/unsafe-html-construction
      
  # Error messages are sanitized with sanitizeErrorMessage()
  - exclude:
      id: js/exception-text-html
